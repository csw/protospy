## Ticket

- **Title**: <title>
- **Linear**: <url>
- **State / priority**: <state> / <priority>

### Description

<The full ticket description, reproduced verbatim.>

### Comments

<"No comments." — or: summary of scope-bearing comments with a note to read the
full thread.>

## Parent & siblings

<"No parent." — or: parent PRO-NNN "<title>" (<state>): <one-line summary of how
it frames this work>. Siblings: PRO-NNN "<title>" (<state>): <one-line bearing
