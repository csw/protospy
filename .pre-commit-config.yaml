repos:
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: e38709b2694c2988ab0c618ee63ac156e155d5c4  # frozen: 0.10.9
    hooks:
      - id: uv-lock
        args: [--project, demo]

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: 3db014c16a9d31997ab8c07a4d61fcce936c8f0d  # frozen: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [feat, fix, docs, chore, build, test, refactor, style, perf, ci, revert]

  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: bash -c 'cd demo && uv run ruff check --fix .'
        language: system
        files: ^demo/.*\.py$
        pass_filenames: false
      - id: ruff-format
        name: ruff-format
        entry: bash -c 'cd demo && uv run ruff format .'
        language: system
        files: ^demo/.*\.py$
        pass_filenames: false
      - id: pyright
        name: pyright
        entry: bash -c 'cd demo && uv run pyright'
        language: system
        files: ^demo/.*\.py$
        pass_filenames: false
