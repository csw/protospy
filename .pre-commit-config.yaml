repos:
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: e38709b2694c2988ab0c618ee63ac156e155d5c4 # frozen: 0.10.9
    hooks:
      - id: uv-lock
        args: [--project, flix]

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: 3db014c16a9d31997ab8c07a4d61fcce936c8f0d # frozen: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args:
          [
            feat,
            fix,
            docs,
            chore,
            build,
            test,
            refactor,
            style,
            perf,
            ci,
            revert,
          ]

  - repo: local
    hooks:
      - id: worktree-claude-setup
        name: Set up Claude config symlinks in worktrees
        entry: bash scripts/worktree-claude-setup.sh
        language: system
        stages: [post-checkout]
        always_run: true
        pass_filenames: false
      - id: ruff-flix
        name: ruff (flix)
        entry: bash -c 'cd flix && uv run ruff check --fix .'
        language: system
        files: ^flix/
        exclude: '\.md$'
        pass_filenames: false
        # Fast check: halt before the heavyweight suites if linting fails.
        fail_fast: true
      - id: ruff-format-flix
        name: ruff-format (flix)
        entry: bash -c 'cd flix && uv run ruff format .'
        language: system
        files: ^flix/
        exclude: '\.md$'
        pass_filenames: false
        fail_fast: true
      - id: pyright-flix
        name: pyright (flix)
        entry: bash -c 'cd flix && uv run pyright'
        language: system
        files: ^flix/
        exclude: '\.md$'
        pass_filenames: false
        fail_fast: true
      - id: pytest-unit-flix
        name: pytest unit (flix)
        entry: just flix test-unit
        language: system
        files: ^flix/
        exclude: '\.md$'
        pass_filenames: false
      # Requires Elasticsearch running at localhost:9200 with the demo index
      # loaded. If ES is down, the gate fails with a connection error.
      - id: pytest-e2e-flix
        name: pytest e2e (flix)
        entry: just flix test-e2e
        language: system
        files: ^flix/
        exclude: '\.md$'
        pass_filenames: false
      - id: ruff-conformance
        name: ruff (conformance)
        entry: bash -c 'cd conformance && uv run ruff check --fix .'
        language: system
        files: ^conformance/
        exclude: '\.md$'
        pass_filenames: false
        fail_fast: true
      - id: ruff-format-conformance
        name: ruff-format (conformance)
        entry: bash -c 'cd conformance && uv run ruff format .'
        language: system
        files: ^conformance/
        exclude: '\.md$'
        pass_filenames: false
        fail_fast: true
      - id: pyright-conformance
        name: pyright (conformance)
        entry: bash -c 'cd conformance && uv run pyright'
        language: system
        files: ^conformance/
        exclude: '\.md$'
        pass_filenames: false
        fail_fast: true
      # Note: conformance tests require a live protospy instance plus managed
      # proxy infrastructure (caddy, haproxy) — not runnable in a cold
      # pre-commit context. Run manually: just conformance test
      - id: ts-rs-export
        name: ensure ts-rs bindings are up to date
        entry: bash -c 'cargo test export_bindings && ls bindings && git diff --exit-code bindings && [[ $(git ls-files --others --exclude-standard bindings | wc -l) -eq 0 ]]'
        language: system
        files: ^(src/|Cargo\.)
        pass_filenames: false
        fail_fast: true
      # Note: the ui hooks below use language: system and depend on node_modules
      # built for the host platform. Working trees must not be shared across
      # Mac and Linux — each platform needs its own checkout with its own
      # node_modules, or these hooks will fail.
      - id: prettier-ui
        name: prettier (ui)
        entry: bash -c 'cd ui && pnpm run format:check'
        language: system
        files: ^ui/
        pass_filenames: false
        fail_fast: true
      - id: prettier-demo
        name: prettier (demo)
        language: node
        entry: prettier
        args: [--write, demo/content/]
        additional_dependencies: ["prettier@3.8.3"]
        files: ^demo/content/
        pass_filenames: false
        fail_fast: true
      - id: eslint-ui
        name: eslint (ui)
        entry: bash -c 'cd ui && pnpm run lint'
        language: system
        files: ^ui/
        exclude: '\.md$'
        pass_filenames: false
        fail_fast: true
      - id: pnpm-typecheck-ui
        name: pnpm typecheck (ui)
        entry: bash -c 'cd ui && pnpm run typecheck'
        language: system
        files: ^ui/
        exclude: '\.md$'
        pass_filenames: false
        fail_fast: true
      - id: pnpm-test-coverage-ui
        name: pnpm test:coverage (ui)
        entry: just ui test-coverage
        language: system
        files: ^ui/
        exclude: '\.md$'
        pass_filenames: false
      # Requires Playwright browsers (pnpm exec playwright install).
      - id: playwright-browser-ui
        name: playwright browser tests (ui)
        entry: just ui test-browser
        language: system
        files: ^ui/
        exclude: '\.md$'
        pass_filenames: false
