{% extends "base.html" %}
{% block content %}
<h1 class="page-title">Movie Search</h1>
<div x-data="pageState()" @click="selectCard($event)">
    <form hx-get="/search" hx-target="#results">
        <div x-data="combobox()" @click.outside="dismiss()" id="suggestions">
            <div class="search-box">
                <input
                    x-ref="input"
                    type="text"
                    id="search-input"
                    placeholder="Search movies..."
                    hx-get="/suggest"
                    hx-trigger="keyup changed delay:300ms"
                    hx-target="#suggestions-list"
                    name="q"
                    autocomplete="off"
                    role="combobox"
                    :aria-expanded="open"
                    aria-haspopup="listbox"
                    aria-autocomplete="list"
                    @keydown.arrow-down.prevent="arrowDown()"
                    @keydown.arrow-up.prevent="arrowUp()"
                    @keydown.escape.prevent="dismiss()"
                    @keydown.enter="onEnter($event)"
                >
                <button type="submit" class="search-btn" aria-label="Search">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                </button>
            </div>
            <div
                x-ref="list"
                id="suggestions-list"
                role="listbox"
                @mousedown.prevent
                @click="$event.target.closest('li') && select($event.target.closest('li'))"
            ></div>
        </div>
    </form>
    <div id="detail"></div>
    <div id="results"></div>
</div>
{% endblock %}
