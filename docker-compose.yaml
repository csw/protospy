services:
  demo:
    build:
      context: ./demo
    ports:
      - "8001:8000"
    environment:
      - ELASTICSEARCH_URL=http://protospy:3000
      - OTLP_ENDPOINT=http://jaeger:4318
    depends_on:
      - protospy
      - jaeger
    healthcheck:
      test: curl -sf 'http://localhost:8001/search?q=abyss'
      interval: 10s
      start_period: 30s
      start_interval: 2s
      timeout: 5s
      retries: 10

  protospy:
    build:
      context: .
    ports:
      - "3001:3000"
      - "3101:3100"
    depends_on:
      - elasticsearch
    environment:
      - RUST_BACKTRACE=1
      - PROXY__ES__PORT=3000
      - PROXY__ES__TARGET=elasticsearch:9200
    healthcheck:
      test: curl -sf http://localhost:3000/_cluster/health
      interval: 10s
      start_period: 30s
      start_interval: 2s
      timeout: 5s
      retries: 10

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.1
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.ml.enabled=false
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: curl -sf http://localhost:9200/_cluster/health
      interval: 10s
      start_period: 30s
      start_interval: 2s
      timeout: 5s
      retries: 10

  jaeger:
    image: cr.jaegertracing.io/jaegertracing/jaeger:${JAEGER_VERSION:-2.17.0}
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
      - "14250:14250"
      - "14268:14268"
      - "14269:14269"
      - "9411:9411"
    environment:
      - a=b
      #- LOG_LEVEL=debug

volumes:
  esdata:
