<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>protospy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Barlow+Condensed:wght@400;500;600;700;900&family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap"
      rel="stylesheet"
    />
    <!--
      Critical anti-flash styles — loaded synchronously before Vite's
      CSS modules arrive (globals.css is imported via main.tsx, so it's
      injected by JS). Only background-color and color-scheme are needed;
      the full theme loads later. Keyed on the next-themes `.dark` class.
      Values must match the --background token in app/globals.css.
    -->
    <style>
      html.dark {
        color-scheme: dark;
        background-color: #0c0f14;
      }
      html:not(.dark) {
        color-scheme: light;
        background-color: #fbfbfc;
      }
    </style>
    <!--
      Theme bootstrap IIFE — runs before React to prevent a flash.

      v2.3 owns theme through next-themes (`.dark` class on <html>, persisted as
      a plain string under the `theme` localStorage key). This is a client-only
      Vite SPA, so next-themes can't apply the class until its JS runs; this IIFE
      sets the class synchronously on first paint to match what next-themes will
      reconcile on mount, preventing a flash. The retired bootstrap read the old
      Zustand `protospy-ui-prefs` key and set `data-theme`.

      The preference is a three-state enum: 'light' | 'dark' | 'system'.
      'system' resolves via matchMedia. The default for fresh installs (no
      stored preference) is 'system', overridable at runtime via a
      ?defaultTheme= query parameter (the demo site uses this to force dark).
      Must agree with resolveDefaultTheme() in src/theme/theme.ts.
    -->
    <script>
      (function () {
        // Resolve a theme preference to 'dark' or 'light'.
        function resolve(pref) {
          if (pref === "light" || pref === "dark") return pref;
          // 'system' or unknown: follow OS.
          try {
            return window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
          } catch (e) {
            return "dark";
          }
        }

        // Default for fresh installs. Overridable via ?defaultTheme= query
        // param (e.g. the demo site passes ?defaultTheme=dark on the iframe).
        function isValidPref(v) {
          return v === "light" || v === "dark" || v === "system";
        }
        var qp = new URLSearchParams(location.search).get("defaultTheme");
        var defaultTheme = isValidPref(qp) ? qp : "system";

        var pref = defaultTheme;
        try {
          // next-themes stores the raw preference string under `theme`.
          var stored = localStorage.getItem("theme");
          if (isValidPref(stored)) pref = stored;
        } catch (e) {}

        // next-themes' class strategy: toggle `.dark` on <html>.
        document.documentElement.classList.toggle(
          "dark",
          resolve(pref) === "dark",
        );
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
