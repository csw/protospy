<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>protospy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Barlow+Condensed:wght@400;500;600;700;900&family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        try {
          var raw = localStorage.getItem("protospy-ui-prefs");
          if (raw) {
            var parsed = JSON.parse(raw);
            if (parsed.state && typeof parsed.state.darkMode === "boolean") {
              // Honour stored user preference (dark or light).
              document.documentElement.setAttribute(
                "data-theme",
                parsed.state.darkMode ? "dark" : "light",
              );
              return;
            }
          }
        } catch (e) {}
        // No stored preference: default to dark (matches store default).
        document.documentElement.setAttribute("data-theme", "dark");
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
