# GHA cache scopes per image (protospy, flix) so they don't clobber each other.
name: docker-ci

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/**"
      - "ui/**"
      - "docker-compose.yaml"
      - "flix/**"
      - ".github/workflows/docker-ci.yml"
      - ".github/actions/smoke-test/**"
  pull_request:
    paths:
      - "Dockerfile"
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/**"
      - "ui/**"
      - "docker-compose.yaml"
      - "flix/**"
      - ".github/workflows/docker-ci.yml"
      - ".github/actions/smoke-test/**"

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: protospy-protospy:latest
          cache-from: type=gha,scope=protospy
          cache-to: type=gha,scope=protospy,mode=max
      - uses: docker/build-push-action@v7
        with:
          context: ./flix
          load: true
          tags: protospy-flix:latest
          cache-from: type=gha,scope=flix
          cache-to: type=gha,scope=flix,mode=max
      - uses: ./.github/actions/smoke-test
        with:
          protospy-image: protospy-protospy:latest
          flix-image: protospy-flix:latest
