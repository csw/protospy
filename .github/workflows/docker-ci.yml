# GHA cache scopes per image (protospy, flix) so they don't clobber each other.
name: docker-ci

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/**"
      - "ui/**"
      - "docker-compose.yaml"
      - "flix/**"
      - ".github/workflows/docker-ci.yml"
  pull_request:
    paths:
      - "Dockerfile"
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/**"
      - "ui/**"
      - "docker-compose.yaml"
      - "flix/**"
      - ".github/workflows/docker-ci.yml"

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: protospy-protospy:latest
          cache-from: type=gha,scope=protospy
          cache-to: type=gha,scope=protospy,mode=max
      - uses: docker/build-push-action@v7
        with:
          context: ./flix
          load: true
          tags: protospy-flix:latest
          cache-from: type=gha,scope=flix
          cache-to: type=gha,scope=flix,mode=max
      - uses: hoverkraft-tech/compose-action@v2.6.0
        with:
          compose-file: ./docker-compose.yaml
          up-flags: --wait
      - name: Load data
        run: >-
          docker compose run --rm
          -e ELASTICSEARCH_URL=http://elasticsearch:9200
          flix uv run python loader.py
      - name: Smoke test
        run: |
          curl -sf http://localhost:8001/health
          curl -sf http://localhost:3001/_cluster/health
          curl -sf 'http://localhost:8001/search?q=test'
