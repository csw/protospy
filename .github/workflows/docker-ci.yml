name: docker-ci

on:
  push:
    paths:
      - "Dockerfile"
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/**"
      - "ui/**"
      - "docker-compose.yaml"
      - "demo/Dockerfile"
      - ".github/workflows/docker-ci.yml"
  pull_request:
    paths:
      - "Dockerfile"
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/**"
      - "ui/**"
      - "docker-compose.yaml"
      - "demo/Dockerfile"
      - ".github/workflows/docker-ci.yml"

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile

  smoke-test:
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@v6
      - uses: hoverkraft-tech/compose-action@v2.5.0
        with:
          compose-file: ./docker-compose.yaml
          up-flags: --build --wait
      - name: Smoke test
        run: curl -sf 'http://localhost:8001/search?q=test'
