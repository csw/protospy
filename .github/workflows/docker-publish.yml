name: docker-publish

on:
  workflow_dispatch:

jobs:
  build-protospy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v6

      # Build UI (embedded into binary via rust_embed)
      - uses: pnpm/action-setup@v6
        with:
          package_json_file: ui/package.json
      - uses: actions/setup-node@v4
        with:
          node-version-file: ui/package.json
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: ui
      - run: pnpm run build
        working-directory: ui

      # Cross toolchain for aarch64-musl (ring has C/asm that needs a C cross-compiler)
      - run: sudo apt-get update && sudo apt-get install -y musl-tools gcc-aarch64-linux-gnu

      # Build Rust binaries natively per arch (embed pre-built ui/dist/)
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl,aarch64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --target x86_64-unknown-linux-musl
      - run: cargo build --release --target aarch64-unknown-linux-musl
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_musl: aarch64-linux-gnu-gcc

      # Stage binaries where Dockerfile expects them (TARGETARCH = amd64 | arm64)
      - run: |
          mkdir -p publish/linux/amd64 publish/linux/arm64
          cp target/x86_64-unknown-linux-musl/release/protospy publish/linux/amd64/protospy
          cp target/aarch64-unknown-linux-musl/release/protospy  publish/linux/arm64/protospy

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: type=raw,value=dev

      - uses: docker/login-action@v4
        with: { registry: ghcr.io, username: "${{ github.actor }}", password: "${{ github.token }}" }

      - uses: docker/setup-buildx-action@v4

      - uses: docker/build-push-action@v7
        id: push
        with:
          context: .
          file: Dockerfile.release
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: mode=max
          sbom: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}

    # Need to make repo public first
    #   - uses: actions/attest-build-provenance@v2
    #     with:
    #       subject-name: ghcr.io/${{ github.repository }}
    #       subject-digest: ${{ steps.push.outputs.digest }}
    #       push-to-registry: true

  build-flix:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/elasticflix
          tags: type=raw,value=dev

      - uses: docker/login-action@v4
        with: { registry: ghcr.io, username: "${{ github.actor }}", password: "${{ github.token }}" }

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v4

      - uses: docker/build-push-action@v7
        id: push
        with:
          context: ./flix
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: mode=max
          sbom: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}

    # Need to make repo public first
    #   - uses: actions/attest-build-provenance@v2
    #     with:
    #       subject-name: ghcr.io/${{ github.repository_owner }}/elasticflix
    #       subject-digest: ${{ steps.push.outputs.digest }}
    #       push-to-registry: true

  build-demo:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/protospy-demo
          tags: type=raw,value=dev

      - uses: docker/login-action@v4
        with: { registry: ghcr.io, username: "${{ github.actor }}", password: "${{ github.token }}" }

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v4

      - uses: docker/build-push-action@v7
        id: push
        with:
          context: ./demo
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: mode=max
          sbom: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}

    # Need to make repo public first
    #   - uses: actions/attest-build-provenance@v2
    #     with:
    #       subject-name: ghcr.io/${{ github.repository_owner }}/protospy-demo
    #       subject-digest: ${{ steps.push.outputs.digest }}
    #       push-to-registry: true
