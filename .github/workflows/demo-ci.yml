name: demo-ci

on:
  push:
    paths:
      - "demo/**"
      - ".github/workflows/demo-ci.yml"
  pull_request:
    paths:
      - "demo/**"
      - ".github/workflows/demo-ci.yml"

defaults:
  run:
    working-directory: demo

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: demo/uv.lock
      - run: uv sync --frozen --group dev
      - name: Format check
        run: uv run ruff format --check .
      - name: Lint
        run: uv run ruff check --output-format github .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: demo/uv.lock
      - run: uv sync --frozen --group dev
      - run: uv run pyright .

  test:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: demo/uv.lock
      - run: uv sync --frozen --group dev
      - name: Run unit tests
        run: uv run pytest -v -m "not e2e" --junit-xml=unit-results.xml --cov --cov-report=xml:coverage.xml --cov=src
      - uses: hoverkraft-tech/compose-action@v2.5.0
        with:
          compose-file: ./docker-compose.yaml
          services: elasticsearch
          up-flags: --wait
      - name: Install Playwright browsers
        run: uv run playwright install --with-deps chromium
      - name: Load data
        run: uv run python loader.py
        env:
          ELASTICSEARCH_URL: http://localhost:9200
      - name: Run e2e tests
        run: >-
          uv run pytest -m e2e
          --screenshot=only-on-failure
          --video=retain-on-failure
          --tracing=retain-on-failure
          --output=playwright-results
          --junit-xml=e2e-results.xml
        env:
          ELASTICSEARCH_URL: http://localhost:9200
      - name: Coverage summary
        run: uv run coverage report --format=markdown >> $GITHUB_STEP_SUMMARY
      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: |
            demo/unit-results.xml
            demo/e2e-results.xml
      - name: Upload Playwright artifacts
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-results
          path: demo/playwright-results/
      - uses: dorny/test-reporter@v2.6.0
        if: always()
        with:
          name: Tests
          path: demo/unit-results.xml,demo/e2e-results.xml
          reporter: java-junit
          use-actions-summary: true

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: demo/uv.lock
      - run: uv export --frozen --no-dev --no-emit-project --output-file requirements.txt
      - run: uvx pip-audit -r requirements.txt

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: ./demo
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
