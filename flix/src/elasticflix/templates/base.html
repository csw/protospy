<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ElasticFlix</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script>
    document.addEventListener('alpine:init', () => {
        Alpine.data('combobox', () => ({
            open: false,
            activeIndex: -1,
            typedValue: '',

            init() {
                this.$refs.list.addEventListener('htmx:afterSwap', () => {
                    this.open = this.$refs.list.children.length > 0;
                    this.activeIndex = -1;
                    if (this.open) this.typedValue = this.$refs.input.value;
                });
            },

            get items() {
                return [...this.$refs.list.querySelectorAll('li')];
            },

            arrowDown() {
                if (!this.open) return;
                if (this.activeIndex === -1) this.typedValue = this.$refs.input.value;
                this.activate(Math.min(this.activeIndex + 1, this.items.length - 1));
            },

            arrowUp() {
                if (!this.open) return;
                if (this.activeIndex > 0) this.activate(this.activeIndex - 1);
                else if (this.activeIndex === 0) this.clearActive();
            },

            onEnter(e) {
                if (this.activeIndex >= 0) { e.preventDefault(); this.selectActive(); }
                else this.dismiss();
            },

            activate(index) {
                this.activeIndex = index;
                this.items.forEach((item, i) => item.classList.toggle('highlighted', i === index));
                const active = this.items[index];
                if (active) this.$refs.input.value = active.textContent.trim();
            },

            clearActive() {
                this.activeIndex = -1;
                this.items.forEach(item => item.classList.remove('highlighted'));
                this.$refs.input.value = this.typedValue;
            },

            select(li) {
                this.$refs.input.value = li.textContent.trim();
                this.dismiss();
                this.$refs.input.form.requestSubmit();
            },

            selectActive() {
                const active = this.items[this.activeIndex];
                if (active) this.select(active);
            },

            dismiss() {
                this.$refs.list.innerHTML = '';
                this.open = false;
                this.activeIndex = -1;
            },
        }));
    });
    </script>
    <script defer src="https://unpkg.com/alpinejs@3.15.8/dist/cdn.min.js"></script>
    <style>
        /* ── Reset ── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        /* ── Tokens ── */
        :root {
            --bg:            #0d0d11;
            --surface:       #141420;
            --surface-2:     #1b1b2a;
            --border:        #22223a;
            --text:          #ece9f8;
            --text-muted:    #68667c;
            --accent:        #e8b84b;
            --accent-subtle: rgba(232, 184, 75, 0.12);
            --rating:        #ff8c4b;
            --radius:        10px;
            --font-display:  'Bebas Neue', sans-serif;
            --font-body:     'DM Sans', sans-serif;
            --shadow:        0 8px 32px rgba(0, 0, 0, 0.45);
            --transition:    0.16s ease;
        }

        /* ── Base ── */
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-body);
            font-size: 15px;
            line-height: 1.6;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        a { color: inherit; text-decoration: none; }

        /* ── Layout ── */
        .container { max-width: 1120px; margin: 0 auto; padding: 0 1.5rem; }

        /* ── Header ── */
        header {
            border-bottom: 1px solid var(--border);
            padding: 0.875rem 0;
            position: sticky;
            top: 0;
            background: rgba(13, 13, 17, 0.9);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            z-index: 200;
        }
        nav { display: flex; justify-content: space-between; align-items: center; }
        .logo {
            font-family: var(--font-display);
            font-size: 1.65rem;
            letter-spacing: 0.06em;
            color: var(--text);
        }
        .logo span { color: var(--accent); }
        .nav-link {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-muted);
            transition: color var(--transition);
        }
        .nav-link:hover { color: var(--accent); }

        /* ── Main ── */
        main { padding: 2.5rem 0 5rem; }

        /* ── Page title ── */
        .page-title {
            font-family: var(--font-display);
            font-size: clamp(2.75rem, 5vw, 4.5rem);
            letter-spacing: 0.04em;
            line-height: 1;
            margin-bottom: 1.5rem;
        }

        /* ── Search ── */
        #suggestions { position: relative; margin-bottom: 2.5rem; }
        .search-box { position: relative; }
        .search-box input {
            width: 100%;
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 50px;
            color: var(--text);
            font-family: var(--font-body);
            font-size: 0.975rem;
            padding: 0.875rem 3.25rem 0.875rem 1.5rem;
            outline: none;
            transition: border-color var(--transition), box-shadow var(--transition);
        }
        .search-box input::placeholder { color: var(--text-muted); }
        .search-box input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-subtle);
        }
        .search-btn {
            position: absolute; right: 1rem; top: 50%;
            transform: translateY(-50%);
            background: none; border: none; box-shadow: none; outline: none;
            padding: 0.25rem; margin: 0; width: auto; cursor: pointer;
            display: flex; align-items: center;
            color: var(--text-muted); transition: color var(--transition);
        }
        .search-btn:hover, .search-btn:focus { color: var(--accent); }

        /* ── Suggestions ── */
        #suggestions ul {
            position: absolute;
            left: 0; right: 0;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            list-style: none;
            padding: 0.375rem 0;
            z-index: 100;
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        #suggestions ul li {
            cursor: pointer;
            padding: 0.5rem 1.25rem;
            font-size: 0.875rem;
            transition: background var(--transition), color var(--transition);
        }
        #suggestions ul li:hover,
        #suggestions ul li.highlighted { background: var(--border); color: var(--accent); }

        /* ── Genre facets ── */
        .facet-bar {
            display: flex; align-items: center; gap: 0.4rem; flex-wrap: wrap;
            margin-bottom: 1.25rem;
        }
        .facet-label {
            font-size: 0.7rem; font-weight: 600; letter-spacing: 0.1em;
            text-transform: uppercase; color: var(--text-muted);
            margin-right: 0.25rem;
        }
        .facet-chip {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 50px; padding: 0.2rem 0.6rem;
            font-size: 0.775rem; color: var(--text-muted);
            display: flex; align-items: center; gap: 0.3rem;
        }
        .facet-chip em { color: var(--accent); font-style: normal; font-weight: 600; }

        /* ── Movie grid ── */
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
        }

        /* ── Movie card ── */
        .movie-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-left: 3px solid transparent;
            border-radius: var(--radius);
            padding: 1.125rem 1.125rem 1.125rem 1rem;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            transition: transform var(--transition), box-shadow var(--transition),
                        border-color var(--transition);
        }
        .movie-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow);
            border-color: rgba(232, 184, 75, 0.25);
            border-left-color: var(--accent);
        }
        .movie-card.active, .movie-card.active:hover {
            transform: none;
            border-color: var(--accent);
            border-left-color: var(--accent);
            background: var(--surface-2);
            box-shadow: 0 0 0 1px var(--accent-subtle);
        }
        .movie-card-header { display: flex; align-items: baseline; gap: 0.4rem; flex-wrap: wrap; }
        .movie-title { font-weight: 600; font-size: 0.9375rem; line-height: 1.3; }
        .movie-year { font-size: 0.775rem; color: var(--text-muted); flex-shrink: 0; }
        .movie-overview {
            font-size: 0.825rem;
            color: var(--text-muted);
            line-height: 1.55;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            flex: 1;
        }
        .movie-meta { display: flex; flex-direction: column; gap: 0.2rem; margin-top: auto; padding-top: 0.5rem; }
        .movie-director { font-size: 0.775rem; color: var(--text-muted); }
        .movie-director strong { color: var(--text); font-weight: 500; }
        .movie-genres { font-size: 0.75rem; color: var(--text-muted); }
        .movie-rating {
            font-size: 0.825rem; font-weight: 700;
            color: var(--rating);
            display: flex; align-items: center; gap: 0.2rem;
            margin-top: 0.25rem;
        }
        .no-results { color: var(--text-muted); padding: 1rem 0; }

        /* ── Detail panel ── */
        .detail-panel { margin-bottom: 2rem; }
        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(-6px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .detail-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 2rem;
            max-width: 700px;
            animation: fadeSlideIn 0.2s ease;
        }
        .detail-title {
            font-family: var(--font-display);
            font-size: 2.5rem;
            letter-spacing: 0.04em;
            line-height: 1.05;
            margin-bottom: 0.25rem;
        }
        .detail-tagline {
            font-style: italic;
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }
        .detail-grid {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 0.5rem 1.75rem;
            margin-bottom: 1.5rem;
        }
        .detail-grid dt {
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-muted);
            padding-top: 0.125rem;
        }
        .detail-grid dd { font-size: 0.875rem; color: var(--text); }
        .detail-overview {
            font-size: 0.875rem;
            color: var(--text-muted);
            line-height: 1.75;
            padding-top: 1.25rem;
            border-top: 1px solid var(--border);
        }

        /* ── Similar panel ── */
        .similar-panel {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
        }
        .similar-heading {
            font-family: var(--font-display);
            font-size: 1.3rem;
            letter-spacing: 0.04em;
            margin-bottom: 1rem;
        }
        .similar-list {
            list-style: none;
        }
        .similar-item {
            padding: 0.75rem 0.875rem;
            border-left: 3px solid transparent;
            border-radius: var(--radius);
            transition: background var(--transition), border-color var(--transition);
            display: flex;
            align-items: baseline;
            gap: 0.75rem;
        }
        .similar-item:hover {
            background: var(--accent-subtle);
            border-left-color: var(--accent);
        }
        .similar-item-title {
            color: var(--text);
            font-weight: 500;
        }
        .similar-item-year {
            color: var(--text-muted);
            font-size: 0.775rem;
            margin-left: auto;
            flex-shrink: 0;
        }

        /* ── Top movies section ── */
        .top-movies-section { margin-top: 0.5rem; }
        .section-heading {
            font-family: var(--font-display);
            font-size: clamp(1.4rem, 3vw, 2rem);
            letter-spacing: 0.06em;
            margin-bottom: 1.25rem;
        }
        .loading-hint { color: var(--text-muted); padding: 1rem 0; }

        /* ── Stats ── */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2.5rem; align-items: start; }
        @media (max-width: 640px) { .stats-grid { grid-template-columns: 1fr; } }
        .stats-heading {
            font-family: var(--font-display);
            font-size: 1.6rem;
            letter-spacing: 0.06em;
            color: var(--accent);
            margin-bottom: 1rem;
        }
        .stats-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .stats-table th {
            text-align: left;
            padding: 0.4rem 0.75rem;
            font-size: 0.7rem; font-weight: 600;
            letter-spacing: 0.1em; text-transform: uppercase;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
        }
        .stats-table td { padding: 0.45rem 0.75rem; border-bottom: 1px solid rgba(34,34,58,0.5); }
        .stats-table tr:last-child td { border-bottom: none; }
        .stats-table td:last-child { color: var(--text-muted); text-align: right; }

        /* Bar chart */
        .bar-row { display: flex; align-items: center; gap: 0.625rem; margin-bottom: 0.4rem; }
        .bar-label { width: 3.5rem; text-align: right; font-size: 0.75rem; color: var(--text-muted); flex-shrink: 0; }
        .bar-track {
            flex: 1; height: 7px;
            background: var(--surface-2);
            border-radius: 4px; overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 4px;
            transition: width 0.4s ease;
        }
        .bar-count { font-size: 0.75rem; color: var(--text-muted); min-width: 2.5rem; }
    </style>
</head>
<body hx-boost="true" hx-swap="innerHTML scroll:top">
    <header>
        <div class="container">
            <nav>
                <a href="/" class="logo">ELASTIC<span>FLIX</span></a>
                <a href="/stats" class="nav-link">Stats</a>
            </nav>
        </div>
    </header>
    <main>
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>
</body>
</html>
